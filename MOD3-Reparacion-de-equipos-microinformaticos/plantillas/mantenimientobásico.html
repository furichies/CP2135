<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Informe de Mantenimiento Preventivo</title>
    <!-- Librería para generar PDF desde HTML -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        :root {
            --primary: #2563eb;
            --primary-dark: #1d4ed8;
            --bg: #f8fafc;
            --card: #ffffff;
            --text: #0f172a;
            --border: #cbd5e1;
            --success: #16a34a;
            --danger: #dc2626;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; background: var(--bg); color: var(--text); line-height: 1.6; padding: 20px; }
        
        .app-container {
            max-width: 800px;
            margin: 0 auto;
            background: var(--card);
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
        }
        h1 { text-align: center; margin-bottom: 25px; color: var(--primary); font-size: 1.8rem; }
        
        .section { margin-bottom: 20px; border: 1px solid var(--border); border-radius: 8px; overflow: hidden; }
        .section-header { background: #f1f5f9; padding: 12px 16px; font-weight: 600; border-bottom: 1px solid var(--border); }
        .section-body { padding: 16px; }
        
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
        .form-group { display: flex; flex-direction: column; }
        .form-group.full { grid-column: 1 / -1; }
        
        label { font-size: 0.9rem; font-weight: 500; margin-bottom: 5px; }
        input, select, textarea {
            padding: 10px;
            border: 1px solid var(--border);
            border-radius: 6px;
            font-size: 0.95rem;
            transition: border 0.2s, box-shadow 0.2s;
        }
        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.15);
        }
        textarea { resize: vertical; min-height: 90px; }
        
        .checkbox-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }
        .checkbox-item { display: flex; align-items: center; gap: 8px; cursor: pointer; }
        .checkbox-item input { width: 18px; height: 18px; accent-color: var(--primary); cursor: pointer; }
        
        .actions { display: flex; gap: 15px; justify-content: center; margin-top: 25px; }
        button {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
        }
        .btn-primary { background: var(--primary); color: white; }
        .btn-primary:hover { background: var(--primary-dark); transform: translateY(-1px); }
        .btn-primary:disabled { background: #94a3b8; cursor: not-allowed; transform: none; }
        .btn-secondary { background: #e2e8f0; color: var(--text); }
        .btn-secondary:hover { background: #cbd5e1; }

        /* Ocultar template de PDF en pantalla */
        #pdf-template { display: none; }
        
        /* Estilos específicos para el PDF generado */
        .pdf-wrapper { font-family: Arial, sans-serif; padding: 20px; color: #111; }
        .pdf-header { text-align: center; margin-bottom: 20px; border-bottom: 2px solid var(--primary); padding-bottom: 10px; }
        .pdf-title { font-size: 18px; font-weight: bold; color: var(--primary); margin-bottom: 4px; }
        .pdf-meta { font-size: 11px; color: #666; }
        .pdf-table { width: 100%; border-collapse: collapse; margin-bottom: 15px; }
        .pdf-table th, .pdf-table td { border: 1px solid #ddd; padding: 8px; font-size: 12px; text-align: left; }
        .pdf-table th { background: #f8fafc; font-weight: 600; width: 35%; }
        .pdf-section-title { font-size: 13px; font-weight: bold; background: #f1f5f9; padding: 8px; margin-bottom: 0; border: 1px solid #ddd; border-bottom: none; }
        .pdf-content-box { border: 1px solid #ddd; border-top: none; padding: 10px; min-height: 50px; margin-bottom: 15px; font-size: 12px; }
        .pdf-status-ok { color: var(--success); font-weight: bold; }
        .pdf-status-no { color: var(--danger); font-weight: bold; }
        .pdf-signature { margin-top: 40px; border-top: 1px solid #333; width: 50%; padding-top: 5px; font-size: 11px; text-align: center; }

        @media (max-width: 600px) {
            .form-grid, .checkbox-grid { grid-template-columns: 1fr; }
            .app-container { padding: 15px; }
        }
    </style>
</head>
<body>

<div class="app-container">
    <h1>🔧 Informe de Mantenimiento Preventivo</h1>
    
    <form id="mainForm">
        <!-- DATOS DEL EQUIPO -->
        <div class="section">
            <div class="section-header">📦 Datos del Equipo</div>
            <div class="section-body form-grid">
                <div class="form-group">
                    <label for="sn">Número de Serie (SN) *</label>
                    <input type="text" id="sn" required placeholder="Ej: ABC123456789">
                </div>
                <div class="form-group">
                    <label for="tipo">Tipo de Equipo</label>
                    <select id="tipo">
                        <option value="Sobremesa">Sobremesa</option>
                        <option value="Portátil">Portátil</option>
                        <option value="Workstation">Workstation</option>
                        <option value="Otro">Otro</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="marca">Marca</label>
                    <input type="text" id="marca" placeholder="Ej: Dell, HP, Lenovo...">
                </div>
                <div class="form-group">
                    <label for="modelo">Modelo</label>
                    <input type="text" id="modelo" placeholder="Ej: Latitude 5540">
                </div>
            </div>
        </div>

        <!-- DATOS DEL TÉCNICO -->
        <div class="section">
            <div class="section-header">👨‍🔧 Datos del Mantenimiento</div>
            <div class="section-body form-grid">
                <div class="form-group">
                    <label for="tecnico">Técnico Responsable *</label>
                    <input type="text" id="tecnico" required placeholder="Nombre completo">
                </div>
                <div class="form-group">
                    <label for="fecha">Fecha de Intervención</label>
                    <input type="date" id="fecha">
                </div>
                <div class="form-group full">
                    <label for="estado">Estado Final del Equipo</label>
                    <select id="estado">
                        <option value="Operativo">✅ Operativo</option>
                        <option value="Requiere Reparación">⚠️ Requiere Reparación</option>
                        <option value="En Pruebas">🔍 En Pruebas</option>
                        <option value="Baja Técnica">❌ Baja Técnica</option>
                    </select>
                </div>
            </div>
        </div>

        <!-- TAREAS -->
        <div class="section">
            <div class="section-header">🔍 Tareas de Mantenimiento Realizadas</div>
            <div class="section-body">
                <div class="checkbox-grid" id="tareas-container">
                    <!-- Se generan por JS -->
                </div>
            </div>
        </div>

        <!-- DIAGNÓSTICO -->
        <div class="section">
            <div class="section-header">📝 Diagnóstico y Recomendaciones</div>
            <div class="section-body form-grid">
                <div class="form-group full">
                    <label for="diagnostico">Observaciones / Hallazgos</label>
                    <textarea id="diagnostico" placeholder="Describa el estado interno, errores encontrados, wear de disco, temperaturas, etc."></textarea>
                </div>
                <div class="form-group full">
                    <label for="recomendaciones">Recomendaciones</label>
                    <textarea id="recomendaciones" placeholder="Cambiar pasta térmica, ampliar RAM, migrar a SSD, actualizar BIOS, etc."></textarea>
                </div>
            </div>
        </div>
    </form>

    <div class="actions">
        <button type="button" class="btn-primary" id="btn-pdf" onclick="exportarPDF()">📄 Generar Informe PDF</button>
        <button type="button" class="btn-secondary" onclick="limpiarFormulario()">🔄 Limpiar</button>
    </div>
</div>

<!-- TEMPLATE OCULTO PARA PDF -->
<div id="pdf-template">
    <div class="pdf-wrapper" id="pdf-content">
        <!-- Se rellena dinámicamente -->
    </div>
</div>

<script>
    // Configuración de tareas
    const tareas = [
        "Limpieza interna/externa",
        "Revisión de ventiladores/temperatura",
        "Actualización SO y Drivers",
        "Verificación estado Disco/SSD",
        "Revisión y test de Memoria RAM",
        "Revisión Fuente de Alimentación",
        "Verificación de Cables y Conexiones",
        "Escaneo Antivirus y Antimalware",
        "Realización de Copia de Seguridad"
    ];

    // Inicialización
    document.addEventListener('DOMContentLoaded', () => {
        const container = document.getElementById('tareas-container');
        tareas.forEach((t, i) => {
            const div = document.createElement('div');
            div.className = 'checkbox-item';
            div.innerHTML = `<input type="checkbox" id="tarea_${i}"><label for="tarea_${i}">${t}</label>`;
            container.appendChild(div);
        });
        // Fecha por defecto: hoy
        document.getElementById('fecha').valueAsDate = new Date();
    });

    function validarFormulario() {
        const sn = document.getElementById('sn').value.trim();
        const tecnico = document.getElementById('tecnico').value.trim();
        if (!sn) { alert("⚠️ El Número de Serie (SN) es obligatorio."); return false; }
        if (!tecnico) { alert("⚠️ El Técnico Responsable es obligatorio."); return false; }
        return true;
    }

    function exportarPDF() {
        if (!validarFormulario()) return;

        const btn = document.getElementById('btn-pdf');
        btn.disabled = true;
        btn.textContent = "⏳ Generando PDF...";

        // Recopilar datos
        const datos = {
            sn: document.getElementById('sn').value.trim(),
            tipo: document.getElementById('tipo').value,
            marca: document.getElementById('marca').value.trim() || "N/A",
            modelo: document.getElementById('modelo').value.trim() || "N/A",
            tecnico: document.getElementById('tecnico').value.trim(),
            fecha: document.getElementById('fecha').value,
            estado: document.getElementById('estado').value,
            diagnostico: document.getElementById('diagnostico').value.trim() || "Sin observaciones relevantes.",
            recomendaciones: document.getElementById('recomendaciones').value.trim() || "Ninguna por el momento."
        };

        // Recopilar tareas
        let tareasHTML = '';
        tareas.forEach((t, i) => {
            const checked = document.getElementById(`tarea_${i}`).checked;
            tareasHTML += `<tr>
                <td>${t}</td>
                <td class="${checked ? 'pdf-status-ok' : 'pdf-status-no'}">${checked ? '✅ SÍ' : '❌ NO'}</td>
            </tr>`;
        });

        // Construir contenido PDF
        const pdfContent = document.getElementById('pdf-content');
        pdfContent.innerHTML = `
            <div class="pdf-header">
                <div class="pdf-title">INFORME DE MANTENIMIENTO PREVENTIVO</div>
                <div class="pdf-meta">Microinformática | Generado: ${new Date().toLocaleString('es-ES')}</div>
            </div>

            <div class="pdf-section-title">📦 DATOS DEL EQUIPO</div>
            <table class="pdf-table">
                <tr><th>Nº Serie (SN)</th><td>${datos.sn}</td></tr>
                <tr><th>Marca / Modelo</th><td>${datos.marca} ${datos.modelo}</td></tr>
                <tr><th>Tipo</th><td>${datos.tipo}</td></tr>
            </table>

            <div class="pdf-section-title">👨‍🔧 DATOS DE INTERVENCIÓN</div>
            <table class="pdf-table">
                <tr><th>Técnico</th><td>${datos.tecnico}</td></tr>
                <tr><th>Fecha</th><td>${datos.fecha}</td></tr>
                <tr><th>Estado Final</th><td>${datos.estado}</td></tr>
            </table>

            <div class="pdf-section-title">🔍 TAREAS REALIZADAS</div>
            <table class="pdf-table">
                <tr><th style="width:70%">Tarea</th><th style="width:30%;text-align:center">Completada</th></tr>
                ${tareasHTML}
            </table>

            <div class="pdf-section-title">📝 DIAGNÓSTICO</div>
            <div class="pdf-content-box">${datos.diagnostico.replace(/\n/g, '<br>')}</div>

            <div class="pdf-section-title">💡 RECOMENDACIONES</div>
            <div class="pdf-content-box">${datos.recomendaciones.replace(/\n/g, '<br>')}</div>

            <div class="pdf-signature">Firma y Sello del Técnico</div>
        `;

        // Configuración de html2pdf
        const element = document.getElementById('pdf-content');
        const opt = {
            margin:       10,
            filename:     `Informe_MTO_${datos.sn}_${datos.fecha}.pdf`,
            image:        { type: 'jpeg', quality: 0.98 },
            html2canvas:  { scale: 2, useCORS: true },
            jsPDF:        { unit: 'mm', format: 'a4', orientation: 'portrait' }
        };

        // Generar y descargar
        html2pdf().set(opt).from(element).save().then(() => {
            btn.disabled = false;
            btn.textContent = "📄 Generar Informe PDF";
        }).catch(err => {
            console.error(err);
            alert("❌ Error al generar el PDF. Revise la consola.");
            btn.disabled = false;
            btn.textContent = "📄 Generar Informe PDF";
        });
    }

    function limpiarFormulario() {
        if(confirm("¿Seguro que desea borrar todos los campos?")) {
            document.getElementById('mainForm').reset();
            document.getElementById('fecha').valueAsDate = new Date();
        }
    }
</script>

</body>
</html>
